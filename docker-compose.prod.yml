services:
  caddy:
    image: caddy:2-alpine
    container_name: acgfaka-caddy
    depends_on:
      - app
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?Set SITE_DOMAIN in .env.prod}
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN:?Set PRIMARY_DOMAIN in .env.prod}
      SITE_EMAIL: ${SITE_EMAIL:?Set SITE_EMAIL in .env.prod}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
    restart: unless-stopped

  app:
    image: ${ACGFAKA_IMAGE:-acgfaka-custom:latest}
    container_name: acgfaka-app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_DEBUG: ${APP_DEBUG:-0}
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-acgfaka}
      DB_USERNAME: ${DB_USERNAME:-faka}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.prod}
      DB_PREFIX: ${DB_PREFIX:-acg_}
      ORDER_CLEANUP_INTERVAL: ${ORDER_CLEANUP_INTERVAL:-60}
      STORE_APP_ID: ${STORE_APP_ID:-}
      STORE_APP_KEY: ${STORE_APP_KEY:-}
      EPAY_APPID: ${EPAY_APPID:-}
      EPAY_APPSECRET: ${EPAY_APPSECRET:-}
    volumes:
      - app_runtime:/var/www/html/runtime
      - app_assets_cache:/var/www/html/assets/cache
    networks:
      - public
      - private
    restart: unless-stopped

  cron:
    image: ${ACGFAKA_IMAGE:-acgfaka-custom:latest}
    container_name: acgfaka-cron
    depends_on:
      db:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          php /var/www/html/close_expired_orders.php
          sleep "$${ORDER_CLEANUP_INTERVAL:-60}"
        done
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-acgfaka}
      DB_USERNAME: ${DB_USERNAME:-faka}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.prod}
      DB_PREFIX: ${DB_PREFIX:-acg_}
      ORDER_CLEANUP_INTERVAL: ${ORDER_CLEANUP_INTERVAL:-60}
    volumes:
      - app_runtime:/var/www/html/runtime
    networks:
      - private
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: acgfaka-db
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-acgfaka}
      MYSQL_USER: ${DB_USERNAME:-faka}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.prod}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env.prod}
      DB_PREFIX: ${DB_PREFIX:-acg_}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env.prod}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env.prod}
      ADMIN_NICKNAME: ${ADMIN_NICKNAME:-Admin}
      ADMIN_SALT: ${ADMIN_SALT:?Set ADMIN_SALT in .env.prod}
      SITE_URL: ${SITE_URL:-}
      CNAME_DOMAIN: ${CNAME_DOMAIN:-}
      SUBSTATION_DOMAINS: ${SUBSTATION_DOMAINS:-}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init/01-import.sh:/docker-entrypoint-initdb.d/01-import.sh:ro
      - ./kernel/Install/Install.sql:/docker-entrypoint-initdb.d/Install.sql.template:ro
    networks:
      - private
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: acgfaka-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - redis_data:/data
    networks:
      - private
    restart: unless-stopped

networks:
  public:
    driver: bridge
  private:
    driver: bridge
    internal: true

volumes:
  app_runtime:
  app_assets_cache:
  caddy_data:
  caddy_config:
  db_data:
  redis_data:
