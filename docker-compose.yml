services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: acgfaka-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DEBUG: "1"
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-acgfaka}
      DB_USERNAME: ${DB_USERNAME:-faka}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_database_password}
      DB_PREFIX: ${DB_PREFIX:-acg_}
    ports:
      - "${ACG_HTTP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - app_vendor:/var/www/html/vendor
      - app_runtime:/var/www/html/runtime
      - app_assets_cache:/var/www/html/assets/cache
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: acgfaka-db
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-acgfaka}
      MYSQL_USER: ${DB_USERNAME:-faka}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_this_database_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_mysql_root_password}
      DB_PREFIX: ${DB_PREFIX:-acg_}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-change_this_mysql_root_password}"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    ports:
      - "${ACG_MYSQL_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init/01-import.sh:/docker-entrypoint-initdb.d/01-import.sh:ro
      - ./kernel/Install/Install.sql:/docker-entrypoint-initdb.d/Install.sql.template:ro
    restart: unless-stopped

volumes:
  app_vendor:
  app_runtime:
  app_assets_cache:
  db_data:
