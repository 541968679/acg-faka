#{include file="../Common/Header.html"}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-900">安全中心</h1>
</div>
#{include file="../Common/SecurityNav.html"}
<div class="glow-card p-5">
    <h3 class="text-sm font-semibold text-slate-600 mb-4"><i class="fas fa-lock text-indigo-500 mr-2"></i>修改密码</h3>
    <form class="layui-form space-y-4" style="max-width: 400px;">
        <div>
            <label class="block text-sm font-medium text-slate-600 mb-1.5">当前密码</label>
            <input type="password" name="old_password" class="ai-input w-full" placeholder="输入当前密码" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-600 mb-1.5">新密码</label>
            <input type="password" name="password" class="ai-input w-full" placeholder="设置新密码" minlength="6" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-600 mb-1.5">确认密码</label>
            <input type="password" name="re_password" class="ai-input w-full" placeholder="再次输入新密码" minlength="6" required>
        </div>
        <div class="pt-2">
            <button type="submit" class="btn-ai px-6 py-2 rounded-lg"><i class="fas fa-save mr-2"></i>修改密码</button>
        </div>
    </form>
</div>
#{ready("/assets/user/controller/security/password.js")}
#{include file="../Common/Footer.html"}
