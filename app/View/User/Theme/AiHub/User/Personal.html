#{include file="../Common/Header.html"}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-900">安全中心</h1>
    <p class="text-slate-500 text-sm mt-1">管理账户安全设置</p>
</div>
#{include file="../Common/SecurityNav.html"}
<div class="glow-card p-5">
    <h3 class="text-sm font-semibold text-slate-600 mb-4"><i class="fas fa-user text-indigo-500 mr-2"></i>个人资料</h3>
    <form class="layui-form space-y-4" style="max-width: 400px;">
        <div>
            <label class="block text-sm font-medium text-slate-600 mb-1.5">头像</label>
            <div class="flex items-center gap-3">
                <img src="#{$user.avatar}" class="w-16 h-16 rounded-full object-cover bg-slate-200" id="avatar-preview" alt="">
                <input type="hidden" name="avatar">
                <button type="button" class="upload-avatar text-sm text-indigo-600 hover:text-indigo-500">更换头像</button>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-600 mb-1.5">用户名</label>
            <input type="text" name="username" value="#{$user.username}" class="ai-input w-full" disabled>
        </div>
        <!--start::HOOK-->
        #{hook(\App\Consts\Hook::USER_VIEW_PERSONAL_FORM)}
        <!--end::HOOK-->
        <div class="pt-2">
            <button type="submit" class="btn-ai px-6 py-2 rounded-lg"><i class="fas fa-save mr-2"></i>保存</button>
        </div>
    </form>
</div>
#{ready("/assets/user/controller/security/personal.js")}
#{include file="../Common/Footer.html"}
