#{include file="./Header.html"}
<main class="auth-card-wrapper">
    <div class="w-full max-w-md mx-auto px-4 relative z-10">
        <div class="glow-card p-8">
            <div class="text-center mb-6">
                <img src="/assets/aihub/images/logo.svg" alt="Logo" class="w-10 h-10 rounded-xl mx-auto mb-3">
                <h2 class="text-xl font-bold text-slate-900">找回密码</h2>
                <p class="text-slate-500 text-sm mt-1">通过手机验证重置密码</p>
            </div>
            <form class="needs-validation space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">手机号码</label>
                    <div class="flex gap-2">
                        <input type="text" name="phone" class="ai-input flex-1" placeholder="注册时的手机号" required>
                        <button type="button" class="send-sms px-4 py-2 bg-indigo-500/10 text-indigo-600 rounded-lg border border-indigo-500/20 hover:bg-indigo-500/20 text-sm whitespace-nowrap transition">发送验证码</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">短信验证码</label>
                    <input type="text" name="sms_code" class="ai-input w-full" placeholder="输入短信验证码">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">新密码</label>
                    <input type="password" name="password" class="ai-input w-full" placeholder="设置新密码" minlength="6">
                </div>
                <button type="submit" class="btn-ai w-full py-3 rounded-lg text-center font-semibold">
                    <i class="fas fa-key mr-2"></i>重置密码
                </button>
            </form>
            <p class="text-center text-sm text-slate-500 mt-6">
                <a href="/user/authentication/login" class="text-indigo-600 hover:text-indigo-500 no-underline">← 返回登录</a>
            </p>
        </div>
    </div>
</main>
#{ready("/assets/user/controller/auth/forget.phone.js")}
#{include file="./Footer.html"}
