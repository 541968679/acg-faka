#{include file="./Header.html"}
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="max-w-xl mx-auto">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-indigo-500/10 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-search text-indigo-400 text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 mb-2">订单查询</h1>
            <p class="text-slate-500 text-sm">输入订单号或联系方式查询订单状态和卡密</p>
        </div>

        <div class="glow-card p-6">
            <form class="order-query-form">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-600 mb-2">订单号/联系方式</label>
                    <input type="text" name="keywords" value="#{$tradeNo}" class="ai-input w-full" placeholder="请输入订单号、邮箱、手机号或 QQ">
                </div>
                <button type="submit" class="btn-ai btn-search-query w-full py-3 rounded-lg text-center">
                    <i class="fas fa-search mr-2"></i>查询订单
                </button>
            </form>
        </div>

        <div class="loading-state mt-6" style="display: none;">
            <div class="glow-card p-6 text-center text-slate-500">
                <i class="fas fa-spinner fa-spin text-indigo-500 text-2xl mb-3"></i>
                <p class="mb-0">正在查询订单信息...</p>
            </div>
        </div>

        <div class="no-results mt-6" style="display: none;">
            <div class="glow-card p-6 text-center text-slate-500">
                <i class="fas fa-search text-slate-400 text-3xl mb-3"></i>
                <h2 class="text-base font-semibold text-slate-700 mb-2">未找到相关订单</h2>
                <p class="mb-0 text-sm">请检查订单号或联系方式是否正确，或联系客服协助查询。</p>
            </div>
        </div>

        <div class="order-results mt-6" style="display: none;">
            <div class="order-list"></div>
        </div>
    </div>
</main>
#{ready("/assets/user/controller/index/query.js")}
#{include file="./Footer.html"}
