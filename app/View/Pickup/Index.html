<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSON提卡</title>
    <style>
        :root {
            color-scheme: light;
            --border: #d8dee8;
            --muted: #667085;
            --text: #111827;
            --primary: #2563eb;
            --danger: #b42318;
            --success: #067647;
            --bg: #f4f7fb;
            --panel: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        main {
            width: min(640px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 18px 55px rgba(17, 24, 39, .08);
        }
        h1 {
            margin: 0 0 18px;
            font-size: 24px;
            letter-spacing: 0;
        }
        label {
            display: block;
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            min-height: 118px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 16px;
            line-height: 1.45;
            outline: none;
            resize: vertical;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        button {
            height: 42px;
            border: 0;
            border-radius: 6px;
            padding: 0 16px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .primary { background: var(--primary); color: #fff; }
        .secondary { background: #e8eef8; color: #1f2937; }
        .secondary:disabled { cursor: not-allowed; opacity: .45; }
        .result {
            display: none;
            margin-top: 18px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            line-height: 1.75;
            font-size: 14px;
            max-height: 360px;
            overflow: auto;
        }
        .pickup-item {
            padding: 10px 0;
            border-top: 1px solid var(--border);
        }
        .pickup-item:first-child { border-top: 0; padding-top: 0; }
        .pickup-item:last-child { padding-bottom: 0; }
        .pickup-code { font-weight: 700; color: var(--text); overflow-wrap: anywhere; }
        .summary { margin-bottom: 10px; font-weight: 700; color: var(--text); }
        .hint { margin: -2px 0 10px; font-size: 13px; color: var(--muted); }
        .ok { color: var(--success); }
        .error { color: var(--danger); }
        .muted { color: var(--muted); }
        @media (max-width: 520px) {
            body { padding: 12px; }
            main { padding: 20px; }
            .actions { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
<main>
    <h1>JSON提卡</h1>
    <label for="code">提卡码</label>
    <div class="hint">支持多行输入提卡码，也可以用逗号或分号分隔。</div>
    <textarea id="code" autocomplete="off" placeholder="例如 JP-ABC123-DEF456&#10;JP-GHJ789-KLM012"></textarea>
    <div class="actions">
        <button class="primary" id="query" type="button">查询</button>
        <button class="secondary" id="download" type="button" disabled>下载文件</button>
    </div>
    <div class="result" id="result"></div>
</main>
<script>
    const codeInput = document.getElementById('code');
    const result = document.getElementById('result');
    const download = document.getElementById('download');

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, match => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[match]));
    }

    function show(html, ok) {
        result.style.display = 'block';
        result.className = 'result ' + (ok ? 'ok' : 'error');
        result.innerHTML = html;
    }

    function getFilename(response, fallback) {
        const disposition = response.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="([^"]+)"/i);
        return match ? match[1] : fallback;
    }

    async function readError(response) {
        const text = await response.clone().text();
        try {
            const data = JSON.parse(text);
            return data.msg || data.message || '下载失败';
        } catch (e) {
            return text || '下载失败';
        }
    }

    function renderItems(items, canDownloadAll) {
        const rows = items.map((item, index) => `
            <div class="pickup-item">
                <div class="pickup-code">${index + 1}. ${escapeHtml(item.code)}</div>
                <div class="${item.can_download ? 'ok' : 'error'}">状态：${escapeHtml(item.status_text)}</div>
                <div>文件：${escapeHtml(item.filename)}</div>
                <div>商品：${escapeHtml(item.commodity_name || '-')}</div>
                <div class="muted">下载次数：${escapeHtml(item.download_count)} / ${escapeHtml(item.max_downloads)}</div>
                <div class="muted">过期时间：${escapeHtml(item.expire_time || '永久')}</div>
            </div>
        `).join('');
        const ready = items.filter(item => item.can_download).length;
        show(`<div class="summary">可下载 ${ready} / ${items.length}</div>${rows}`, canDownloadAll);
    }

    codeInput.addEventListener('input', () => {
        download.disabled = true;
    });

    document.getElementById('query').addEventListener('click', async () => {
        const codes = codeInput.value.trim();
        download.disabled = true;
        if (!codes) {
            show('请输入提卡码', false);
            return;
        }
        const body = new URLSearchParams({codes});
        const response = await fetch('/pickup/batchQuery', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'},
            body
        });
        const data = await response.json();
        if (data.code !== 200) {
            show(escapeHtml(data.msg || '查询失败'), false);
            return;
        }
        const items = Array.isArray(data.data?.items) ? data.data.items : [];
        download.disabled = !data.data?.can_download_all;
        renderItems(items, Boolean(data.data?.can_download_all));
    });

    download.addEventListener('click', async () => {
        const codes = codeInput.value.trim();
        if (!codes) {
            return;
        }
        download.disabled = true;
        const body = new URLSearchParams({codes});
        const response = await fetch('/pickup/batchDownload', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'},
            body
        });
        const disposition = response.headers.get('Content-Disposition') || '';
        if (!response.ok || !disposition) {
            show(escapeHtml(await readError(response)), false);
            download.disabled = false;
            return;
        }
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = getFilename(response, 'json-pickup.zip');
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        download.disabled = false;
    });
</script>
</body>
</html>
