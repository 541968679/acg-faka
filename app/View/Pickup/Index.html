<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSON提卡</title>
    <style>
        :root {
            color-scheme: light;
            --border: #d8dee8;
            --muted: #667085;
            --text: #111827;
            --primary: #2563eb;
            --danger: #b42318;
            --success: #067647;
            --bg: #f4f7fb;
            --panel: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        main {
            width: min(560px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 18px 55px rgba(17, 24, 39, .08);
        }
        h1 {
            margin: 0 0 18px;
            font-size: 24px;
            letter-spacing: 0;
        }
        label {
            display: block;
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            height: 46px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 14px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        button {
            height: 42px;
            border: 0;
            border-radius: 6px;
            padding: 0 16px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .primary { background: var(--primary); color: #fff; }
        .secondary { background: #e8eef8; color: #1f2937; }
        .secondary:disabled { cursor: not-allowed; opacity: .45; }
        .result {
            display: none;
            margin-top: 18px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            line-height: 1.75;
            font-size: 14px;
        }
        .ok { color: var(--success); }
        .error { color: var(--danger); }
        .muted { color: var(--muted); }
        @media (max-width: 520px) {
            body { padding: 12px; }
            main { padding: 20px; }
            .actions { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
<main>
    <h1>JSON提卡</h1>
    <label for="code">提卡码</label>
    <input id="code" autocomplete="off" placeholder="例如 JP-ABC123-DEF456">
    <div class="actions">
        <button class="primary" id="query" type="button">查询</button>
        <button class="secondary" id="download" type="button" disabled>下载 JSON</button>
    </div>
    <div class="result" id="result"></div>
</main>
<script>
    const codeInput = document.getElementById('code');
    const result = document.getElementById('result');
    const download = document.getElementById('download');

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, match => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[match]));
    }

    function show(html, ok) {
        result.style.display = 'block';
        result.className = 'result ' + (ok ? 'ok' : 'error');
        result.innerHTML = html;
    }

    document.getElementById('query').addEventListener('click', async () => {
        const code = codeInput.value.trim();
        download.disabled = true;
        if (!code) {
            show('请输入提卡码', false);
            return;
        }
        const body = new URLSearchParams({code});
        const response = await fetch('/pickup/query', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'},
            body
        });
        const data = await response.json();
        if (data.code !== 200) {
            show(escapeHtml(data.msg || '查询失败'), false);
            return;
        }
        const item = data.data;
        download.disabled = !item.can_download;
        show(`
            <div>状态：${escapeHtml(item.status_text)}</div>
            <div>文件：${escapeHtml(item.filename)}</div>
            <div>商品：${escapeHtml(item.commodity_name || '-')}</div>
            <div class="muted">下载次数：${escapeHtml(item.download_count)} / ${escapeHtml(item.max_downloads)}</div>
            <div class="muted">过期时间：${escapeHtml(item.expire_time || '永久')}</div>
        `, item.can_download);
    });

    download.addEventListener('click', () => {
        const code = codeInput.value.trim();
        if (code) {
            window.location.href = '/pickup/download?code=' + encodeURIComponent(code);
        }
    });
</script>
</body>
</html>
